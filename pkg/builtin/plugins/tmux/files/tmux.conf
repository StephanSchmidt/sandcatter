# Enable 256 color support and true color
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Enable mouse support for scrolling and pane selection
set -g mouse on

# Increase scrollback buffer for better history
set -g history-limit 10000

# Status bar configuration
set -g status-position bottom
set -g status-style 'bg=colour234 fg=colour137'
set -g status-left ''
set -g status-right '#[fg=colour233,bg=colour241,bold] %d/%m #[fg=colour233,bg=colour245,bold] %H:%M:%S '
set -g status-right-length 50
set -g status-left-length 20

# Window status format
setw -g window-status-current-style 'fg=colour1 bg=colour19 bold'
setw -g window-status-current-format ' #I#[fg=colour249]:#[fg=colour255]#W#[fg=colour249]#F '
setw -g window-status-style 'fg=colour9 bg=colour18'
setw -g window-status-format ' #I#[fg=colour237]:#[fg=colour250]#W#[fg=colour244]#F '

# Pane border colors
set -g pane-border-style 'fg=colour19 bg=colour0'
set -g pane-active-border-style 'bg=colour0 fg=colour9'

# Window numbering starts at 1 (easier to reach on keyboard)
set -g base-index 1
setw -g pane-base-index 1

# Enable focus events (helps with vim/editor detection)
set -g focus-events on

# Reduce escape time for better vim/editor experience
set -sg escape-time 0

# Renumber windows sequentially after closing any of them
set -g renumber-windows on

# Enable clipboard integration
set -g set-clipboard on

# UTF-8 support (modern tmux has this on by default, but explicit is better)
setw -g aggressive-resize on

# Keybindings
# Split panes using | and - (more intuitive than default " and %)
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Reload config with prefix + r
bind r source-file ~/.tmux.conf \; display "Reloaded tmux config!"
